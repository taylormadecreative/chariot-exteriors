<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,700;0,800;0,900;1,900&family=Hanken+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--blue:#3F6EF0;--green:#3E8C4E;--green-lt:#5BB06C;--navy:#0E2356;}
  html,body{width:1200px;height:630px;overflow:hidden;font-family:'Hanken Grotesk',sans-serif;}
  .card{position:relative;width:1200px;height:630px;overflow:hidden;background:var(--navy);}
  .bg{position:absolute;inset:0;}
  .bg img{width:100%;height:100%;object-fit:cover;}
  .scrim{position:absolute;inset:0;background:
    linear-gradient(100deg,rgba(8,18,46,.96) 0%,rgba(10,22,58,.9) 40%,rgba(10,22,58,.5) 66%,rgba(10,22,58,.12) 100%);}
  .scrim2{position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,18,46,.55),rgba(8,18,46,0) 45%);}
  .inner{position:absolute;inset:0;padding:60px 64px;display:flex;flex-direction:column;}
  /* logo */
  .logo{font-family:'Archivo',sans-serif;font-weight:900;font-style:italic;line-height:.8;text-align:left;letter-spacing:-.01em;}
  .logo .word{display:block;color:#fff;font-size:46px;}
  .logo .tag{display:block;color:var(--green-lt);font-weight:800;font-style:normal;font-size:15.5px;letter-spacing:.22em;margin-top:8px;}
  /* eyebrow */
  .eyebrow{display:inline-flex;align-items:center;gap:12px;margin-top:auto;font-family:'Archivo',sans-serif;font-weight:700;
    text-transform:uppercase;letter-spacing:.16em;font-size:18px;color:#bcd0ff;}
  .eyebrow::before{content:"";width:46px;height:3px;background:var(--green-lt);border-radius:3px;}
  /* headline */
  h1{font-family:'Archivo',sans-serif;font-weight:900;color:#fff;font-size:104px;line-height:.92;letter-spacing:-.03em;margin:16px 0 0;}
  h1 .g{color:var(--green-lt);}
  .sub{font-size:25px;font-weight:600;color:#dbe6ff;margin-top:20px;letter-spacing:.01em;}
  /* pill + contact row */
  .row{display:flex;align-items:center;gap:22px;margin-top:30px;}
  .pill{display:inline-flex;align-items:center;gap:12px;background:var(--green);color:#fff;font-family:'Archivo',sans-serif;
    font-weight:800;font-size:21px;letter-spacing:.01em;padding:15px 26px;border-radius:999px;box-shadow:0 14px 30px -12px rgba(62,140,78,.7);}
  .pill svg{flex:none;}
  .contact{font-family:'Archivo',sans-serif;font-weight:800;color:#fff;font-size:23px;}
  .contact .u{color:#bcd0ff;font-weight:700;font-size:19px;display:block;margin-top:3px;letter-spacing:.04em;}
  /* corner accent */
  .bar{position:absolute;left:0;top:0;bottom:0;width:12px;background:linear-gradient(180deg,var(--blue),var(--green));}
</style></head>
<body>
  <div class="card">
    <div class="bg"><img src="images/hero.jpg" alt=""></div>
    <div class="scrim"></div><div class="scrim2"></div>
    <div class="bar"></div>
    <div class="inner">
      <div class="logo"><span class="word">CHARIOT</span><span class="tag">SIDING • WINDOWS • DOORS</span></div>
      <span class="eyebrow">Dallas-Fort Worth Home Exteriors</span>
      <h1>Get a<br><span class="g">Free Quote</span></h1>
      <div class="sub">Siding · Windows · Doors · Sunrooms · Professionally installed</div>
      <div class="row">
        <span class="pill">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          Free In-Home Estimate
        </span>
        <span class="contact">(682) 688-2233<span class="u">chariotexteriors.com</span></span>
      </div>
    </div>
  </div>
</body></html>
